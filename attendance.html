<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>출결 현황</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#fff;color:#1a1a1a;padding:16px;font-size:14px;max-width:640px;margin:0 auto}
.header{margin-bottom:14px}.student-name{font-size:18px;font-weight:700}
.month-nav{display:flex;align-items:center;gap:10px;margin-top:8px}
.month-nav button{border:1px solid #e0e0e0;background:#fff;cursor:pointer;padding:3px 10px;border-radius:6px;font-size:13px;color:#555}
.month-nav button:hover{background:#f5f5f5}.month-label{font-size:15px;font-weight:600}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.summary-card{background:#fafafa;border:1px solid #f0f0f0;border-radius:10px;padding:10px 6px;text-align:center}
.summary-card .val{font-size:20px;font-weight:700;line-height:1.2}.summary-card .lbl{font-size:10px;color:#999;margin-top:3px}
.legend{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#777}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.day-header{text-align:center;font-size:11px;font-weight:600;color:#aaa;padding:4px 0}
.day-header.sun{color:#e53935}.day-header.sat{color:#1e88e5}
.day{border-radius:8px;padding:6px 4px 5px;min-height:58px;cursor:default;border:1px solid transparent;transition:box-shadow .1s}
.day.has-record{cursor:pointer}.day.has-record:hover{box-shadow:0 2px 6px rgba(0,0,0,.12)}
.day.empty,.day.weekend-empty{background:transparent;border:none}
.day.weekday-empty{background:#fafafa;border-color:#f0f0f0}
.day.present{background:#e8f5e9;border-color:#c8e6c9}
.day.today{outline:2px solid #333;outline-offset:-2px}
.day-num{font-size:12px;font-weight:600;color:#666;line-height:1}
.day-num.sun{color:#e53935}.day-num.sat{color:#1e88e5}
.day-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:2px;vertical-align:middle}
.dot-present{background:#43a047}
.day-st{font-size:9px;color:#666;margin-top:4px;display:block}
.day-arr{font-size:9px;color:#888;margin-top:2px}
.day-study{font-size:9px;color:#43a047;margin-top:1px}
.detail-panel{margin-top:14px;padding:12px 14px;background:#f8f9fa;border-radius:10px;border-left:3px solid #ccc;display:none}
.detail-panel.active{display:block}
.detail-panel.present{border-color:#43a047}
.detail-title{font-weight:700;font-size:13px;margin-bottom:8px}
.detail-grid{display:grid;grid-template-columns:80px 1fr;gap:4px 8px}
.detail-label{font-size:12px;color:#999}.detail-val{font-size:12px;color:#333}
.loading,.error-msg{text-align:center;padding:40px;color:#aaa;font-size:13px}
.error-msg{color:#e53935}
</style>
</head>
<body>
<div id="app"><div class="loading">로딩 중...</div></div>
<script>
var N8N='https://havit.app.n8n.cloud/webhook/attendance';
var params=new URLSearchParams(location.search);
var STUDENT=(params.get('student')||'').trim();
var today=new Date();
var todayStr=today.toISOString().slice(0,10);
var curYear=parseInt(params.get('year')||today.getFullYear());
var curMonth=parseInt(params.get('month')||(today.getMonth()+1));
var recordMap={};
var A="결석";
var DAYS=["일","월","화","수","목","금","토"];
function pad(n){return String(n).padStart(2,'0');}
function ok(v){return v!==null&&v!==undefined&&v!==false&&v!=='';}
function toMins(t){if(!ok(t))return null;var p=t.split(':'),h=parseInt(p[0]);if(isNaN(h))return null;return h*60+(parseInt(p[1])||0);}
function minsToStr(m){if(!ok(m)||m<=0)return'-';var h=Math.floor(m/60),mn=m%60;if(h>0&&mn>0)return h+'시간 '+mn+'분';if(h>0)return h+'시간';return mn+'분';}
function parseStudyMins(s){if(!ok(s))return 0;var m=0,rh=/(\d+)\s*시간/,rm=/(\d+)\s*분/;var h=s.match(rh);if(h)m+=parseInt(h[1])*60;var mi=s.match(rm);if(mi)m+=parseInt(mi[1]);var c=s.match(/^(\d+):(\d+)$/);if(c)m=parseInt(c[1])*60+parseInt(c[2]);return m;}
function studyMins(rec){var n=parseStudyMins(rec.study_time);if(n>0)return n;var a=toMins(rec.arrival),d=toMins(rec.departure);if(a!==null&&d!==null){var diff=d-a;if(diff>0&&diff<720)return diff;}return 0;}
async function fetchData(y,m){var url=N8N+'?student='+encodeURIComponent(STUDENT)+'&year='+y+'&month='+m;var res=await fetch(url);if(!res.ok)throw new Error('HTTP '+res.status);var t=await res.text();if(t.charAt(0)==='=')t=t.slice(1);return JSON.parse(t);}
function render(records,isError){
  var app=document.getElementById('app');
  recordMap={};
  if(records)records.forEach(function(r){if(r.date)recordMap[r.date]=r;});
  var dim=new Date(curYear,curMonth,0).getDate();
  var fdow=new Date(curYear,curMonth-1,1).getDay();
  var attended=0,totMin=0,sDays=0,maxMin=0;
  if(records)records.forEach(function(r){
    if(r.status===A)return;
    attended++;
    var m=studyMins(r);
    if(m>0){totMin+=m;sDays++;if(m>maxMin)maxMin=m;}
  });
  var avg=sDays>0?Math.round(totMin/sDays):0;
  var hdr='';for(var i=0;i<7;i++)hdr+='<div class="day-header '+(i===0?'sun':i===6?'sat':'')+'">'+DAYS[i]+'</div>';
  var cells='';
  for(var i=0;i<fdow;i++)cells+='<div class="day empty"></div>';
  for(var d=1;d<=dim;d++){
    var ds=curYear+'-'+pad(curMonth)+'-'+pad(d);
    var rec=recordMap[ds];
    var dw=new Date(curYear,curMonth-1,d).getDay();
    var isSun=dw===0,isSat=dw===6;
    var attendedDay=rec&&rec.status!==A;
    var cls='day';
    if(attendedDay)cls+=' has-record present';
    else if(isSun||isSat)cls+=' weekend-empty';
    else cls+=' weekday-empty';
    if(ds===todayStr)cls+=' today';
    var nc='day-num'+(isSun?' sun':isSat?' sat':'');
    var inner='<div class="'+nc+'">'+d+'</div>';
    if(attendedDay){
      inner+='<span class="day-st"><span class="day-dot dot-present"></span>등원</span>';
      if(rec.arrival)inner+='<div class="day-arr">&#9654; '+rec.arrival+'</div>';
      var sm=studyMins(rec);if(sm>0)inner+='<div class="day-study">&#9201; '+minsToStr(sm)+'</div>';
    }
    var oc=attendedDay?'onclick="showDetail(\''+ds+'\')"':'';
    cells+='<div class="'+cls+'" '+oc+'>'+inner+'</div>';
  }
  var KR={title:'출결 현황',year:'년',month:'월',err:'데이터 로드 실패',norec:'기록없음'};
  var cards=[];
  cards.push('<div class="summary-card"><div class="val" style="color:#43a047">'+attended+'</div><div class="lbl">등원</div></div>');
  if(sDays>0&&totMin>0&&sDays>=Math.ceil(attended*0.6)){
    cards.push('<div class="summary-card"><div class="val" style="font-size:15px">'+minsToStr(totMin)+'</div><div class="lbl">누적 순공</div></div>');
  }
  cards.push('<div class="summary-card"><div class="val" style="font-size:15px">'+minsToStr(avg)+'</div><div class="lbl">평균 순공</div></div>');
  cards.push('<div class="summary-card"><div class="val" style="font-size:15px">'+minsToStr(maxMin)+'</div><div class="lbl">최고 몰입</div></div>');
  app.innerHTML=
    (isError?'<div class="error-msg">'+KR.err+'</div>':'')+
    '<div class="header"><div class="student-name">&#128203; '+(STUDENT||'?')+' '+KR.title+'</div>'+
    '<div class="month-nav"><button onclick="changeMonth(-1)">&#9664;</button>'+
    '<span class="month-label">'+curYear+KR.year+' '+curMonth+KR.month+'</span>'+
    '<button onclick="changeMonth(1)">&#9654;</button></div></div>'+
    '<div class="summary" style="grid-template-columns:repeat('+cards.length+',1fr)">'+cards.join('')+'</div>'+
    '<div class="legend">'+
    '<div class="legend-item"><div class="legend-dot" style="background:#43a047"></div>등원</div>'+
    '<div class="legend-item"><div class="legend-dot" style="background:#e0e0e0"></div>'+KR.norec+'</div>'+
    '</div>'+
    '<div class="calendar">'+hdr+cells+'</div>'+
    '<div class="detail-panel" id="dp"><div class="detail-title" id="dt"></div><div class="detail-grid" id="dc"></div></div>';
}
function showDetail(ds){
  var rec=recordMap[ds],panel=document.getElementById('dp'),tl=document.getElementById('dt'),cont=document.getElementById('dc');
  if(!rec)return;
  var dobj=new Date(ds+'T00:00:00');
  tl.textContent=ds+' ('+DAYS[dobj.getDay()]+')';
  panel.className='detail-panel active present';
  var sm=studyMins(rec);
  var DL={st:'상태',at:'등원시각',dep:'하원시각',stt:'공부시간',mo:'메모'};
  cont.innerHTML=
    '<div class="detail-label">'+DL.st+'</div><div class="detail-val" style="color:#43a047">등원</div>'+
    '<div class="detail-label">'+DL.at+'</div><div class="detail-val">'+(rec.arrival||'-')+'</div>'+
    '<div class="detail-label">'+DL.dep+'</div><div class="detail-val">'+(rec.departure||'-')+'</div>'+
    '<div class="detail-label">'+DL.stt+'</div><div class="detail-val">'+minsToStr(sm)+'</div>'+
    '<div class="detail-label">'+DL.mo+'</div><div class="detail-val">'+(rec.memo||'-')+'</div>';
}
async function changeMonth(delta){curMonth+=delta;if(curMonth>12){curMonth=1;curYear++;}if(curMonth<1){curMonth=12;curYear--;}document.getElementById('app').innerHTML='<div class="loading">로딩 중...</div>';await loadAndRender();}
async function loadAndRender(){
  if(!STUDENT){document.getElementById('app').innerHTML='<div class="error-msg">URL에 ?student=학생명 파라미터를 추가해주세요</div>';return;}
  try{var records=await fetchData(curYear,curMonth);render(Array.isArray(records)?records:[],false);}catch(e){console.error(e);render([],true);}
}
loadAndRender();
</script>
</body>
</html>
