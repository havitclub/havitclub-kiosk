<!DOCTYPE html>
<html lang="ko">
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>해빗클럽 출결 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0f1e; --surface: #111827; --surface2: #1a2235;
    --accent: #3b82f6; --accent2: #60a5fa;
    --success: #10b981; --error: #ef4444; --warn: #f59e0b;
    --text: #f1f5f9; --muted: #64748b;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  body::before {
    content: ''; position: fixed; top: -20%; left: 50%;
    transform: translateX(-50%); width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(59,130,246,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .container { width: 100%; max-width: 480px; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .brand { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 4px; color: var(--accent2); text-align: center; }
  .brand span { color: var(--text); }
  .datetime-box { background: var(--surface); border: 1px solid rgba(59,130,246,0.2); border-radius: 16px; padding: 16px 24px; text-align: center; }
  #date-display { font-size: 0.9rem; color: var(--muted); font-weight: 500; margin-bottom: 4px; }
  #time-display { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; letter-spacing: 4px; color: var(--text); line-height: 1; }
  .mode-toggle { display: flex; background: var(--surface); border-radius: 12px; padding: 4px; border: 1px solid rgba(59,130,246,0.15); }
  .mode-btn { flex: 1; padding: 10px 4px; border: none; border-radius: 10px; background: transparent; color: var(--muted); font-family: 'Noto Sans KR', sans-serif; font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all 0.2s; touch-action: manipulation; }
  .mode-btn.active { background: var(--accent); color: white; }
  .mode-btn.out.active { background: var(--warn); color: #1a1a1a; }
  .pin-display { background: var(--surface); border: 2px solid rgba(59,130,246,0.2); border-radius: 16px; padding: 24px; text-align: center; }
  .pin-label { font-size: 0.85rem; color: var(--muted); margin-bottom: 16px; font-weight: 500; }
  .pin-dots { display: flex; justify-content: center; gap: 20px; }
  .pin-dot { width: 48px; height: 48px; border-radius: 50%; border: 2px solid rgba(59,130,246,0.3); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 900; color: var(--accent2); transition: all 0.15s; }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); color: white; transform: scale(1.05); }
  .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .num-btn { background: var(--surface); border: 1px solid rgba(59,130,246,0.15); border-radius: 14px; height: 72px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; font-size: 1.6rem; font-weight: 700; cursor: pointer; transition: all 0.1s; touch-action: manipulation; }
  .num-btn:active { transform: scale(0.94); background: var(--surface2); border-color: var(--accent); }
  .num-btn.del { font-size: 1rem; color: var(--muted); }
  .num-btn.confirm { background: var(--accent); border-color: var(--accent); font-size: 1rem; color: white; font-weight: 700; }
  .result-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .result-overlay.show { opacity: 1; pointer-events: all; }
  .result-card { background: var(--surface); border-radius: 24px; padding: 40px; text-align: center; max-width: 340px; width: 90%; border: 2px solid transparent; transform: scale(0.9); transition: transform 0.25s; }
  .result-overlay.show .result-card { transform: scale(1); }
  .result-card.success { border-color: var(--success); }
  .result-card.error { border-color: var(--error); }
  .result-card.warning { border-color: var(--warn); }
  .result-icon { font-size: 2rem; margin-bottom: 12px; line-height: 1.4; }
  .result-name { font-size: 1.5rem; font-weight: 900; margin-bottom: 6px; }
  .result-sub { font-size: 0.9rem; color: var(--muted); line-height: 1.5; }
  .result-time { font-size: 0.85rem; color: var(--accent2); margin-top: 8px; font-weight: 500; }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(59,130,246,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .confirm-btns { display: flex; gap: 10px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
  .confirm-btns button { padding: 10px 20px; border: none; border-radius: 12px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.15s; touch-action: manipulation; }
  .confirm-btns .btn-yes { background: var(--accent); color: white; }
  .confirm-btns .btn-yes:active { transform: scale(0.95); }
  .confirm-btns .btn-no { background: var(--surface2); color: var(--muted); border: 1px solid rgba(255,255,255,0.1); }
  .confirm-btns .btn-no:active { transform: scale(0.95); }
  .confirm-btns .btn-switch { background: var(--warn); color: #1a1a1a; }
  .confirm-btns .btn-switch:active { transform: scale(0.95); }
  .config-toggle { position: fixed; bottom: 16px; right: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 6px 12px; font-size: 0.7rem; color: var(--muted); cursor: pointer; }
  .config-panel { position: fixed; bottom: 50px; right: 16px; background: var(--surface2); border: 1px solid rgba(59,130,246,0.3); border-radius: 12px; padding: 16px; width: 300px; display: none; z-index: 200; }
  .config-panel.open { display: block; }
  .config-panel label { font-size: 0.75rem; color: var(--muted); display: block; margin-bottom: 4px; }
  .config-panel input { width: 100%; background: var(--bg); border: 1px solid rgba(59,130,246,0.3); border-radius: 8px; padding: 8px 10px; color: var(--text); font-size: 0.75rem; margin-bottom: 10px; }
  .config-save { background: var(--accent); border: none; border-radius: 8px; padding: 8px 16px; color: white; font-size: 0.8rem; cursor: pointer; width: 100%; }
</style>
</head>
<body>
<div class="container">
  <div class="brand">HAVIT<span>CLUB</span></div>
  <div class="datetime-box">
    <div id="date-display"></div>
    <div id="time-display">00:00</div>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('등원')" id="btn-arrive">🏃 등원</button>
    <button class="mode-btn out" onclick="setMode('외출')" id="btn-out">🚶 외출</button>
    <button class="mode-btn out" onclick="setMode('복귀')" id="btn-return">↩️ 복귀</button>
    <button class="mode-btn" onclick="setMode('하원')" id="btn-depart">🏠 하원</button>
  </div>
  <div class="pin-display">
    <div class="pin-label">4자리 학생 번호를 입력하세요</div>
    <div class="pin-dots">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
    </div>
  </div>
  <div class="numpad">
    <button class="num-btn" onclick="input('1')">1</button>
    <button class="num-btn" onclick="input('2')">2</button>
    <button class="num-btn" onclick="input('3')">3</button>
    <button class="num-btn" onclick="input('4')">4</button>
    <button class="num-btn" onclick="input('5')">5</button>
    <button class="num-btn" onclick="input('6')">6</button>
    <button class="num-btn" onclick="input('7')">7</button>
    <button class="num-btn" onclick="input('8')">8</button>
    <button class="num-btn" onclick="input('9')">9</button>
    <button class="num-btn del" onclick="del()">⌫ 지우기</button>
    <button class="num-btn" onclick="input('0')">0</button>
    <button class="num-btn confirm" onclick="confirm_input()">확인 ✓</button>
  </div>
</div>

<div class="result-overlay" id="result-overlay">
  <div class="result-card" id="result-card">
    <div class="result-icon" id="result-icon">⏳</div>
    <div class="result-name" id="result-name">처리 중...</div>
    <div class="result-sub" id="result-sub"></div>
    <div class="result-time" id="result-time"></div>
    <div class="confirm-btns" id="confirm-btns" style="display:none;"></div>
  </div>
</div>

<div class="config-toggle" onclick="toggleConfig()">⚙ 설정</div>
<div class="config-panel" id="config-panel">
  <label>출결 Webhook URL (등원/하원)</label>
  <input type="text" id="webhook-url" placeholder="https://havit.app.n8n.cloud/webhook/attendance">
  <label>외출 Webhook URL (외출/복귀)</label>
  <input type="text" id="outing-url" placeholder="https://havit.app.n8n.cloud/webhook/outing">
  <button class="config-save" onclick="saveConfig()">저장</button>
</div>

<script>
var pin = '';
var mode = '등원';
var isProcessing = false;
var webhookUrl = localStorage.getItem('habitclub_webhook') || 'https://havit.app.n8n.cloud/webhook/attendance';
var outingUrl = localStorage.getItem('habitclub_outing_webhook') || 'https://havit.app.n8n.cloud/webhook/outing';
document.getElementById('webhook-url').value = webhookUrl;
document.getElementById('outing-url').value = outingUrl;

/* ---- localStorage tracking ---- */
function getTodayKey() {
  var now = new Date();
  var m = now.getMonth() + 1;
  var d = now.getDate();
  return 'hc_att_' + now.getFullYear() + '-' + (m < 10 ? '0' + m : m) + '-' + (d < 10 ? '0' + d : d);
}

function getTodayRecords(code) {
  try {
    var data = JSON.parse(localStorage.getItem(getTodayKey()) || '{}');
    return data[code] || [];
  } catch(e) { return []; }
}

function saveTodayRecord(code, recMode, time) {
  try {
    var key = getTodayKey();
    var data = JSON.parse(localStorage.getItem(key) || '{}');
    if (!data[code]) data[code] = [];
    data[code].push({ mode: recMode, time: time });
    localStorage.setItem(key, JSON.stringify(data));
  } catch(e) { console.error(e); }
}

function cleanOldRecords() {
  var todayKey = getTodayKey();
  for (var i = localStorage.length - 1; i >= 0; i--) {
    var k = localStorage.key(i);
    if (k && k.indexOf('hc_att_') === 0 && k !== todayKey) {
      localStorage.removeItem(k);
    }
  }
}
cleanOldRecords();

/* ---- witty warning messages ---- */
var MSG_DOUBLE_ARRIVE = [
  "옥? 아까 등원했는데? 🤨",
  "또 등원? 하원 아니야? 🫣",
  "등원 두 번째인데~? 🧐",
  "분신술? 이미 왔잖아 😏",
  "카톡 두 번 간다~ 진짜? 📱"
];

var MSG_NO_ARRIVE = [
  "옥? 등원 안 했는데? 👻",
  "먼저 등원부터~ 😎",
  "등원이 먼저 아닐까? 🤭",
  "투명인간이었어? 👀",
  "순서: 등원 → 하원 📋"
];

var MSG_DOUBLE_DEPART = [
  "옥? 아까 하원했는데? 🤨",
  "또 하원? 등원 아니야? 🫣",
  "하원 두 번째인데~? 🧐",
  "혹시 등원 맞지? 🤔",
  "다시 한번 확인~ ✋"
];

var MSG_DOUBLE_OUT = [
  "또 외출? 복귀 먼저 아니야? 🤔",
  "아직 밖인 걸로 아는데~ 🚶",
  "복귀 안 찍고 나갔었지? 😏",
  "외출 두 번째인데~? 🧐"
];

var MSG_OUT_NO_ARRIVE = [
  "등원도 안 했는데 외출? 👻",
  "먼저 등원부터~ 😎",
  "순서: 등원 → 외출 📋"
];

var MSG_OUT_AFTER_DEPART = [
  "하원했다며? 다시 온 거면 등원! 🏃",
  "하원 후엔 외출 말고 등원~ 📋"
];

var MSG_RETURN_NO_OUT = [
  "외출 기록이 없는데? 👀",
  "나간 적이 없는 걸로~ 🤨",
  "혹시 등원 아니야? 🤔"
];

function randomPick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function checkAttendanceStatus(code, curMode) {
  var records = getTodayRecords(code);
  var last = records.length ? records[records.length - 1] : null;

  if (curMode === '등원') {
    if (last && last.mode === '등원') {
      return { warn: true, type: 'double_arrive', msg: randomPick(MSG_DOUBLE_ARRIVE), lastTime: last.time, switchTo: '하원' };
    }
    return { warn: false };
  }

  if (curMode === '하원') {
    if (!last) {
      return { warn: true, type: 'no_arrive', msg: randomPick(MSG_NO_ARRIVE), switchTo: '등원' };
    }
    if (last.mode === '하원') {
      return { warn: true, type: 'double_depart', msg: randomPick(MSG_DOUBLE_DEPART), lastTime: last.time, switchTo: '등원' };
    }
    return { warn: false };
  }

  if (curMode === '외출') {
    if (!last) {
      return { warn: true, type: 'out_no_arrive', msg: randomPick(MSG_OUT_NO_ARRIVE), switchTo: '등원' };
    }
    if (last.mode === '외출') {
      return { warn: true, type: 'double_out', msg: randomPick(MSG_DOUBLE_OUT), lastTime: last.time, switchTo: '복귀' };
    }
    if (last.mode === '하원') {
      return { warn: true, type: 'out_after_depart', msg: randomPick(MSG_OUT_AFTER_DEPART), lastTime: last.time, switchTo: '등원' };
    }
    return { warn: false };
  }

  if (curMode === '복귀') {
    if (!last || last.mode !== '외출') {
      return { warn: true, type: 'return_no_out', msg: randomPick(MSG_RETURN_NO_OUT), lastTime: last ? last.time : null, switchTo: last ? '외출' : '등원' };
    }
    return { warn: false };
  }

  return { warn: false };
}

/* ---- config ---- */
function saveConfig() {
  webhookUrl = document.getElementById('webhook-url').value.trim();
  outingUrl = document.getElementById('outing-url').value.trim();
  localStorage.setItem('habitclub_webhook', webhookUrl);
  localStorage.setItem('habitclub_outing_webhook', outingUrl);
  document.getElementById('config-panel').classList.remove('open');
  alert('저장되었습니다.');
}
function toggleConfig() { document.getElementById('config-panel').classList.toggle('open'); }

function setMode(m) {
  mode = m;
  var map = { '등원': 'btn-arrive', '외출': 'btn-out', '복귀': 'btn-return', '하원': 'btn-depart' };
  for (var k in map) {
    document.getElementById(map[k]).classList.toggle('active', m === k);
  }
}

function updateClock() {
  var now = new Date();
  var days = ['일','월','화','수','목','금','토'];
  document.getElementById('date-display').textContent =
    now.getFullYear() + '년 ' + (now.getMonth()+1) + '월 ' + now.getDate() + '일 ' + days[now.getDay()] + '요일';
  var h = now.getHours();
  var mi = now.getMinutes();
  document.getElementById('time-display').textContent =
    (h < 10 ? '0' + h : h) + ':' + (mi < 10 ? '0' + mi : mi);
}
setInterval(updateClock, 1000);
updateClock();

function input(digit) {
  if (pin.length >= 4 || isProcessing) return;
  pin += digit;
  updateDots();
  if (pin.length === 4) setTimeout(confirm_input, 200);
}
function del() {
  if (isProcessing) return;
  pin = pin.slice(0, -1);
  updateDots();
}
function updateDots() {
  for (var i = 0; i < 4; i++) {
    var dot = document.getElementById('dot-' + i);
    dot.classList.toggle('filled', i < pin.length);
    dot.textContent = i < pin.length ? '●' : '';
  }
}

/* ---- warning popup ---- */
function showWarning(status, curMode, onConfirm, onSwitch, onCancel) {
  var card = document.getElementById('result-card');
  card.className = 'result-card warning';
  document.getElementById('result-icon').textContent = status.msg;
  document.getElementById('result-name').textContent = '';
  document.getElementById('result-sub').textContent = status.lastTime ? '이전 기록: ' + status.lastTime : '';
  document.getElementById('result-time').textContent = '';

  var btnsDiv = document.getElementById('confirm-btns');
  btnsDiv.style.display = 'flex';

  var josa = { '등원': '등원으로', '하원': '하원으로', '외출': '외출로', '복귀': '복귀로' };
  var switchLabel = '🔄 ' + (josa[status.switchTo] || status.switchTo);
  var confirmLabel = curMode + ' 맞아';

  btnsDiv.innerHTML =
    '<button class="btn-switch" id="warn-switch">' + switchLabel + '</button>' +
    '<button class="btn-yes" id="warn-yes">' + confirmLabel + '</button>' +
    '<button class="btn-no" id="warn-no">취소</button>';

  document.getElementById('result-overlay').classList.add('show');

  document.getElementById('warn-switch').onclick = function() { hideOverlay(); onSwitch(); };
  document.getElementById('warn-yes').onclick = function() { hideOverlay(); onConfirm(); };
  document.getElementById('warn-no').onclick = function() { hideOverlay(); onCancel(); };
}

function hideOverlay() {
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('confirm-btns').style.display = 'none';
}

/* ---- main flow ---- */
function confirm_input() {
  if (pin.length !== 4 || isProcessing) return;
  isProcessing = true;

  var currentPin = pin;
  var currentMode = mode;

  var status = checkAttendanceStatus(currentPin, currentMode);

  if (status.warn) {
    showWarning(
      status,
      currentMode,
      function() { sendToWebhook(currentPin, currentMode); },
      function() {
        var switched = status.switchTo || (currentMode === '등원' ? '하원' : '등원');
        setMode(switched);
        sendToWebhook(currentPin, switched);
      },
      function() { isProcessing = false; pin = ''; updateDots(); }
    );
    return;
  }

  sendToWebhook(currentPin, currentMode);
}

function sendToWebhook(studentCode, sendMode) {
  var now = new Date();
  var mo = now.getMonth() + 1;
  var da = now.getDate();
  var hh = now.getHours();
  var mm = now.getMinutes();
  var payload = {
    student_code: studentCode,
    mode: sendMode,
    timestamp: now.toISOString(),
    date: now.getFullYear() + '-' + (mo < 10 ? '0' + mo : mo) + '-' + (da < 10 ? '0' + da : da),
    time: (hh < 10 ? '0' + hh : hh) + ':' + (mm < 10 ? '0' + mm : mm)
  };

  var targetUrl = (sendMode === '외출' || sendMode === '복귀') ? outingUrl : webhookUrl;

  showResult('loading', '', '처리 중...', '학생 정보 확인 중', '');

  if (!targetUrl) {
    setTimeout(function() {
      saveTodayRecord(studentCode, sendMode, payload.time);
      showResult('success', '✅', '학번 ' + studentCode, sendMode + ' 처리 완료 (데모)', payload.time);
      resetAfter(2000);
    }, 500);
    return;
  }

  fetch(targetUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(function(res) { return res.json().catch(function() { return {}; }); })
  .then(function(data) {
    saveTodayRecord(studentCode, sendMode, payload.time);
    showResult('success', data.is_late ? '⚠️' : '✅', data.name || ('학번 ' + studentCode), data.message || (sendMode + ' 완료'), payload.time);
    resetAfter(2000);
  })
  .catch(function() {
    showResult('error', '❌', '연결 오류', 'Webhook URL을 확인해주세요', '');
    resetAfter(2000);
  });
}

function showResult(type, icon, name, sub, time) {
  var card = document.getElementById('result-card');
  card.className = 'result-card ' + type;
  document.getElementById('result-icon').innerHTML = (type === 'loading') ? '<div class="spinner"></div>' : icon;
  document.getElementById('result-name').textContent = name;
  document.getElementById('result-sub').textContent = sub;
  document.getElementById('result-time').textContent = time;
  document.getElementById('confirm-btns').style.display = 'none';
  document.getElementById('result-overlay').classList.add('show');
}

function resetAfter(ms) {
  setTimeout(function() {
    document.getElementById('result-overlay').classList.remove('show');
    pin = '';
    updateDots();
    isProcessing = false;
  }, ms);
}
</script>
</body>
</html>
